services:
  postgres:
    image: postgres:16
    container_name: getyourslot-db
    environment:
      POSTGRES_DB: getyourslot
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      PGTZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: